<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#050e0d" />
      <stop offset="100%" stop-color="#02050a" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Circuit nodes -->
  <g stroke="#5eead4" stroke-width="3" fill="none" opacity="0.7">
    <!-- Top -->
    <path d="M256 126 L256 70" />
    <circle cx="256" cy="70" r="6" fill="#5eead4" />
    <!-- Bottom -->
    <path d="M256 386 L256 442" />
    <circle cx="256" cy="442" r="6" fill="#5eead4" />
    <!-- Left -->
    <path d="M126 256 L70 256" />
    <circle cx="70" cy="256" r="6" fill="#5eead4" />
    <!-- Right -->
    <path d="M386 256 L442 256" />
    <circle cx="442" cy="256" r="6" fill="#5eead4" />
  </g>

  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="130" stroke="#5eead4" stroke-width="6" fill="none" stroke-dasharray="10 15" opacity="0.8" />
  <circle cx="256" cy="256" r="130" stroke="#ffffff" stroke-width="6" fill="none" stroke-dasharray="0 100 10 90 0 100 10 90" opacity="0.9" />

  <!-- Middle Ring -->
  <circle cx="256" cy="256" r="90" stroke="#5eead4" stroke-width="5" fill="none" stroke-dasharray="12 20" opacity="0.9" />

  <!-- Solid Thin Ring -->
  <circle cx="256" cy="256" r="70" stroke="#5eead4" stroke-width="2" fill="none" opacity="0.5" />

  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="50" stroke="#5eead4" stroke-width="4" fill="none" stroke-dasharray="8 12" />

  <!-- Center Core -->
  <circle cx="256" cy="256" r="22" fill="#5eead4" opacity="0.2" filter="url(#glow)" />
  <circle cx="256" cy="256" r="12" fill="#5eead4" filter="url(#glow)" />
  
  <circle cx="256" cy="256" r="24" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.8" />
  <circle cx="256" cy="256" r="32" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5" />
</svg>
